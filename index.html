<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoekmachine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: #f5f5f5;
            color: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0a0a0a;
                color: #ffffff;
            }
            
            .background-image {
                opacity: 0;
                transition: opacity 1.5s ease-in-out;
                animation: fadeFromBlack 2s ease-in-out;
            }
            
            @keyframes fadeFromBlack {
                0% {
                    opacity: 0;
                    background-color: black;
                }
                100% {
                    opacity: 1;
                    background-color: transparent;
                }
            }
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .background-image.active {
            opacity: 1;
        }

        /* Klok */
        .clock-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        @media (prefers-color-scheme: dark) {
            .clock-container {
                background: rgba(0, 0, 0, 0.7);
            }
        }

        /* Welkomstbericht */
        .welcome-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Feitjes widget - midden onderaan */
        .facts-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
            max-width: 80vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }
        
        .facts-container:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(-50%) scale(1.02);
        }
        
        @media (max-width: 768px) {
            .facts-container {
                font-size: 0.75rem;
                padding: 8px 16px;
                white-space: normal;
                max-width: 90vw;
                text-align: center;
                line-height: 1.3;
            }
        }
        
        .facts-container.hidden {
            display: none;
        }
        
        /* Offline melding */
        .offline-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(220, 53, 69, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: slideInRight 0.3s ease-out;
            cursor: pointer;
        }
        
        .offline-toast.show {
            display: flex;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Zoekcontainer */
        .zoek-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            margin-top: 80px;
            position: relative;
            z-index: 1;
        }

        .zoek-wrapper {
            position: relative;
            width: 100%;
        }

        .zoekbalk {
            width: 100%;
            padding: 16px 70px 16px 24px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            color: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            .zoekbalk {
                background: rgba(20, 20, 20, 0.95);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
                color: #ffffff;
            }
            .zoekbalk::placeholder {
                color: #aaa;
            }
        }

        .zoekbalk:focus {
            outline: none;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            .zoekbalk:focus {
                background: rgba(30, 30, 30, 1);
            }
        }

        .zoek-knop {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            padding: 8px;
        }

        .zoek-knop img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .zoek-knop:hover {
            transform: translateY(-50%) scale(1.1);
            background: rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            .zoek-knop:hover {
                background: rgba(255, 255, 255, 0.1);
            }
        }

        /* Instellingen */
        .instellingen-knop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            backdrop-filter: blur(5px);
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        @media (prefers-color-scheme: dark) {
            .instellingen-knop {
                background: rgba(255, 255, 255, 0.2);
            }
            .instellingen-knop:hover {
                background: rgba(255, 255, 255, 0.3);
            }
        }

        .instellingen-knop:hover {
            transform: scale(1.1);
        }

        .instellingen-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            .instellingen-menu {
                background: rgba(20, 20, 20, 0.98);
                color: #ffffff;
            }
        }

        .instellingen-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .instellingen-menu h2 {
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 24px;
        }

        .instellingen-menu h3 {
            margin: 20px 0 10px 0;
            font-weight: 500;
            font-size: 16px;
        }

        .setting-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            .setting-toggle {
                border-bottom-color: rgba(255,255,255,0.1);
            }
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #007bff;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        .zoekmachine-opties {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }

        .zoekmachine-optie {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            background: #f5f5f5;
        }

        @media (prefers-color-scheme: dark) {
            .zoekmachine-optie {
                background: #2a2a2a;
            }
            .zoekmachine-optie:hover {
                background: #3a3a3a;
            }
        }

        .zoekmachine-optie:hover {
            background: #e0e0e0;
        }

        .zoekmachine-optie.selected {
            border-color: #007bff;
            background: #e3f2fd;
        }

        .zoekmachine-optie input[type="radio"] {
            margin-right: 12px;
            accent-color: #007bff;
        }

        .zoekmachine-optie label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
        }

        .menu-sluiten {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            background: #f0f0f0;
            color: #666;
        }

        @media (prefers-color-scheme: dark) {
            .menu-sluiten {
                background: #333;
                color: #ccc;
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .suggesties {
            list-style: none;
            padding: 8px;
            margin: 12px 0 0 0;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            background: rgba(255, 255, 255, 0.95);
        }

        @media (prefers-color-scheme: dark) {
            .suggesties {
                background: rgba(20, 20, 20, 0.98);
            }
            .suggesties li {
                color: #ffffff;
            }
            .suggesties li:hover {
                background: #3a3a3a;
            }
        }

        .suggesties li {
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            margin: 2px 0;
            color: #1a1a1a;
        }

        .suggesties li:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .error, .loading {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            padding: 8px 20px;
            border-radius: 50px;
            display: none;
        }

        .error {
            background: rgba(220, 53, 69, 0.9);
            color: white;
        }

        .loading {
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        @media (prefers-color-scheme: dark) {
            .loading {
                background: rgba(255, 255, 255, 0.2);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .clock-container {
                font-size: 1.5rem;
                padding: 8px 16px;
            }
            .welcome-container {
                font-size: 0.9rem;
                padding: 8px 16px;
                top: 10px;
                left: 10px;
            }
            .offline-toast {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .zoek-container {
                margin-top: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div id="bg1" class="background-image"></div>
        <div id="bg2" class="background-image"></div>
    </div>

    <!-- Klok -->
    <div class="clock-container" id="clock">--:--</div>
    
    <!-- Welkomstbericht -->
    <div class="welcome-container" id="welcomeMsg"></div>
    
    <!-- Feitjes widget -->
    <div class="facts-container" id="factsContainer">
        <span id="factText">✨ Leuk feitje komt eraan...</span>
    </div>
    
    <!-- Offline melding -->
    <div class="offline-toast" id="offlineToast">
        <span>⚠️</span>
        <span>Whoops... je bent offline</span>
    </div>

    <div class="zoek-container">
        <div class="zoek-wrapper">
            <input type="text" id="zoekveld" class="zoekbalk" placeholder="Zoeken...">
            <button id="zoek-knop" class="zoek-knop" aria-label="Zoeken">
                <img id="zoekIcoon" src="zwartezoekknop.png" alt="Zoeken">
            </button>
        </div>
        <ul id="suggesties-lijst" class="suggesties"></ul>
        <div class="loading" id="loading">Bezig met laden...</div>
        <div class="error" id="error"></div>
    </div>

    <button class="instellingen-knop" id="instellingenKnop">⚙️</button>

    <div class="overlay" id="overlay"></div>

    <div class="instellingen-menu" id="instellingenMenu">
        <button class="menu-sluiten" id="menuSluiten">✕</button>
        <h2>Instellingen</h2>
        
        <div class="setting-toggle">
            <span>💡 Weetjes tonen</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleFacts" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        
        <h3>Kies zoekmachine</h3>
        <div class="zoekmachine-opties" id="zoekmachineOpties">
            <div class="zoekmachine-optie" data-engine="google">
                <input type="radio" name="zoekmachine" id="engineGoogle" value="google" checked>
                <label for="engineGoogle">🔍 Google</label>
            </div>
            <div class="zoekmachine-optie" data-engine="bing">
                <input type="radio" name="zoekmachine" id="engineBing" value="bing">
                <label for="engineBing">🅱️ Bing</label>
            </div>
            <div class="zoekmachine-optie" data-engine="duckduckgo">
                <input type="radio" name="zoekmachine" id="engineDuckDuckGo" value="duckduckgo">
                <label for="engineDuckDuckGo">🦆 DuckDuckGo</label>
            </div>
            <div class="zoekmachine-optie" data-engine="yahoo">
                <input type="radio" name="zoekmachine" id="engineYahoo" value="yahoo">
                <label for="engineYahoo">📰 Yahoo</label>
            </div>
        </div>
    </div>

    <script>
        // ===== NAAM INSTELLEN (eerste keer) =====
        let userName = localStorage.getItem('userName');
        
        function askForName() {
            if (!userName) {
                userName = prompt('Welkom! Wat is je naam?', '');
                if (userName && userName.trim()) {
                    userName = userName.trim();
                    localStorage.setItem('userName', userName);
                } else {
                    userName = 'bezoeker';
                    localStorage.setItem('userName', userName);
                }
                updateWelcomeMessage();
            }
        }
        
        function updateWelcomeMessage() {
            const now = new Date();
            const hour = now.getHours();
            let greeting = '';
            
            if (hour < 6) greeting = '🌙 Goedenacht';
            else if (hour < 12) greeting = '🌅 Goedemorgen';
            else if (hour < 18) greeting = '☀️ Goedemiddag';
            else greeting = '🌙 Goedenavond';
            
            const welcomeDiv = document.getElementById('welcomeMsg');
            welcomeDiv.textContent = `${greeting}, ${userName}!`;
        }
        
        askForName();
        updateWelcomeMessage();
        setInterval(updateWelcomeMessage, 60000); // Update elke minuut
        
        // ===== FEITJES FUNCTIE =====
        let feitjes = [];
        let factInterval = null;
        let factsEnabled = true;
        
        async function laadFeitjes() {
            try {
                const response = await fetch('feitjes.txt');
                if (!response.ok) throw new Error('Kan feitjes.txt niet laden');
                const text = await response.text();
                feitjes = text.trim().split('\n').filter(line => line.trim().length > 0);
                console.log(`${feitjes.length} feitjes geladen`);
                startFactRotation();
            } catch (err) {
                console.error('Feitjes fout:', err);
                document.getElementById('factText').textContent = '💡 Kon feitjes niet laden. Maak een bestand "feitjes.txt" aan.';
            }
        }
        
        function showRandomFact() {
            if (!factsEnabled || feitjes.length === 0) return;
            const randomIndex = Math.floor(Math.random() * feitjes.length);
            const fact = feitjes[randomIndex];
            document.getElementById('factText').textContent = `💡 ${fact}`;
        }
        
        function startFactRotation() {
            if (factInterval) clearInterval(factInterval);
            if (factsEnabled && feitjes.length > 0) {
                showRandomFact();
                factInterval = setInterval(showRandomFact, 10000);
            }
        }
        
        function stopFactRotation() {
            if (factInterval) {
                clearInterval(factInterval);
                factInterval = null;
            }
        }
        
        function toggleFacts(enable) {
            factsEnabled = enable;
            const factsContainer = document.getElementById('factsContainer');
            
            if (enable) {
                factsContainer.classList.remove('hidden');
                startFactRotation();
            } else {
                factsContainer.classList.add('hidden');
                stopFactRotation();
            }
            
            localStorage.setItem('factsEnabled', enable);
        }
        
        // Laad feitjes instelling
        const savedFactsEnabled = localStorage.getItem('factsEnabled');
        if (savedFactsEnabled !== null) {
            factsEnabled = savedFactsEnabled === 'true';
        }
        
        const toggleCheckbox = document.getElementById('toggleFacts');
        toggleCheckbox.checked = factsEnabled;
        toggleCheckbox.addEventListener('change', (e) => {
            toggleFacts(e.target.checked);
        });
        
        // Start feitjes
        laadFeitjes();
        
        // ===== ZOEKICOON THEMA =====
        function updateZoekIcoon() {
            const zoekIcoon = document.getElementById('zoekIcoon');
            const isDonker = window.matchMedia('(prefers-color-scheme: dark)').matches;
            zoekIcoon.src = isDonker ? 'wittezoekknop.png' : 'zwartezoekknop.png';
        }
        updateZoekIcoon();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateZoekIcoon);
        
        // ===== KLOK =====
        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
        
        // ===== OFFLINE DETECTIE =====
        const offlineToast = document.getElementById('offlineToast');
        let wasOffline = false;
        
        function updateOfflineStatus() {
            if (!navigator.onLine) {
                offlineToast.classList.add('show');
                wasOffline = true;
            } else if (wasOffline) {
                offlineToast.classList.add('show');
                const toastSpan = offlineToast.querySelector('span:last-child');
                toastSpan.textContent = '✅ Je bent weer online!';
                offlineToast.style.background = 'rgba(40, 167, 69, 0.95)';
                setTimeout(() => {
                    offlineToast.classList.remove('show');
                    toastSpan.textContent = 'Whoops... je bent offline';
                    offlineToast.style.background = 'rgba(220, 53, 69, 0.95)';
                }, 3000);
                wasOffline = false;
            }
        }
        
        updateOfflineStatus();
        window.addEventListener('online', updateOfflineStatus);
        window.addEventListener('offline', updateOfflineStatus);
        offlineToast.addEventListener('click', () => offlineToast.classList.remove('show'));
        
        // ===== ZOEKMACHINE, SUGGESTIES, ACHTERGROND =====
        let suggesties = [];
        let huidigeAchtergrond = 0;
        let totaalAchtergronden = 10;
        let isAanHetWisselen = false;
        let zoekmachine = { type: 'google' };
        
        const zoekmachineUrls = {
            google: 'https://www.google.com/search?q={q}',
            bing: 'https://www.bing.com/search?q={q}',
            duckduckgo: 'https://duckduckgo.com/?q={q}',
            yahoo: 'https://search.yahoo.com/search?p={q}'
        };
        
        const afbeeldingExtensies = ['.png', '.jpg', '.jpeg', '.gif', '.webp'];
        
        function laadInstellingen() {
            const opgeslagen = localStorage.getItem('zoekmachineInstellingen');
            if (opgeslagen) {
                try {
                    const instellingen = JSON.parse(opgeslagen);
                    zoekmachine = instellingen;
                    const radio = document.querySelector(`input[name="zoekmachine"][value="${zoekmachine.type}"]`);
                    if (radio) radio.checked = true;
                } catch (e) {}
            }
        }
        
        function opslaanInstellingen() {
            localStorage.setItem('zoekmachineInstellingen', JSON.stringify(zoekmachine));
        }
        
        function voerZoekopdrachtUit(query) {
            if (!query) return;
            const exacteMatch = suggesties.find(s => s.tekst.toLowerCase() === query.toLowerCase() && s.url);
            if (exacteMatch) {
                let url = exacteMatch.url;
                if (url && !url.match(/^https?:\/\//i)) url = 'https://' + url;
                window.location.href = url;
                return;
            }
            const baseUrl = zoekmachineUrls[zoekmachine.type] || zoekmachineUrls.google;
            window.location.href = baseUrl.replace('{q}', encodeURIComponent(query));
        }
        
        function openMenu() {
            document.getElementById('instellingenMenu').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }
        
        function sluitMenu() {
            document.getElementById('instellingenMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        
        async function vindAfbeelding(basisNaam) {
            for (const ext of afbeeldingExtensies) {
                const url = basisNaam + ext;
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) return url;
                } catch (e) {}
            }
            return null;
        }
        
        function kiesRandomAchtergrond() {
            return Math.floor(Math.random() * totaalAchtergronden) + 1;
        }
        
        async function wisselAchtergrond() {
            if (isAanHetWisselen) return;
            isAanHetWisselen = true;
            let nieuwNummer;
            do {
                nieuwNummer = kiesRandomAchtergrond();
            } while (nieuwNummer === huidigeAchtergrond && totaalAchtergronden > 1);
            const afbeeldingUrl = await vindAfbeelding(`${nieuwNummer}`);
            if (afbeeldingUrl) {
                const bg1 = document.getElementById('bg1');
                const bg2 = document.getElementById('bg2');
                const isBg1Active = bg1.classList.contains('active');
                if (isBg1Active) {
                    bg2.style.backgroundImage = `url('${afbeeldingUrl}')`;
                    bg2.classList.add('active');
                    bg1.classList.remove('active');
                } else {
                    bg1.style.backgroundImage = `url('${afbeeldingUrl}')`;
                    bg1.classList.add('active');
                    bg2.classList.remove('active');
                }
                huidigeAchtergrond = nieuwNummer;
            }
            isAanHetWisselen = false;
        }
        
        function startAchtergrondRotatie() {
            setTimeout(async () => {
                for (let i = 1; i <= totaalAchtergronden; i++) {
                    const afbeeldingUrl = await vindAfbeelding(`${i}`);
                    if (afbeeldingUrl) {
                        document.getElementById('bg1').style.backgroundImage = `url('${afbeeldingUrl}')`;
                        document.getElementById('bg1').classList.add('active');
                        huidigeAchtergrond = i;
                        break;
                    }
                }
                setInterval(() => wisselAchtergrond(), 10000);
            }, 500);
        }
        
        async function laadSuggesties() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            try {
                loading.style.display = 'block';
                const response = await fetch('zoeksuggesties.txt');
                if (!response.ok) throw new Error('Kan zoeksuggesties.txt niet laden');
                const text = await response.text();
                const regels = text.trim().split('\n');
                suggesties = regels.map(regel => {
                    if (!regel.trim()) return null;
                    const eersteGelijkteken = regel.indexOf('=');
                    if (eersteGelijkteken !== -1) {
                        const tekst = regel.substring(0, eersteGelijkteken).trim();
                        let url = regel.substring(eersteGelijkteken + 1).trim();
                        if (url && !url.match(/^https?:\/\//i)) url = 'https://' + url;
                        return { tekst, url };
                    } else {
                        return { tekst: regel.trim(), url: null };
                    }
                }).filter(s => s !== null);
                loading.style.display = 'none';
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Fout: ${err.message}`;
            }
        }
        
        function zoekSuggesties(input) {
            if (!input || suggesties.length === 0) return [];
            input = input.toLowerCase();
            return suggesties.filter(s => s.tekst.toLowerCase().includes(input)).slice(0, 10);
        }
        
        function toonSuggesties(suggestieLijst) {
            const lijst = document.getElementById('suggesties-lijst');
            if (suggestieLijst.length === 0) {
                lijst.style.display = 'none';
                return;
            }
            lijst.innerHTML = '';
            suggestieLijst.forEach(suggestie => {
                const li = document.createElement('li');
                li.textContent = suggestie.tekst + (suggestie.url ? ' →' : '');
                li.onclick = () => {
                    document.getElementById('zoekveld').value = suggestie.tekst;
                    if (suggestie.url) {
                        let url = suggestie.url;
                        if (url && !url.match(/^https?:\/\//i)) url = 'https://' + url;
                        window.location.href = url;
                    } else {
                        voerZoekopdrachtUit(suggestie.tekst);
                    }
                    lijst.style.display = 'none';
                };
                lijst.appendChild(li);
            });
            lijst.style.display = 'block';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            laadInstellingen();
            laadSuggesties();
            startAchtergrondRotatie();
            
            const zoekveld = document.getElementById('zoekveld');
            const suggestiesLijst = document.getElementById('suggesties-lijst');
            const zoekKnop = document.getElementById('zoek-knop');
            const instellingenKnop = document.getElementById('instellingenKnop');
            const menuSluiten = document.getElementById('menuSluiten');
            const overlay = document.getElementById('overlay');
            
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'i') {
                    e.preventDefault();
                    if (document.getElementById('instellingenMenu').classList.contains('active')) sluitMenu();
                    else openMenu();
                }
            });
            
            instellingenKnop.addEventListener('click', openMenu);
            menuSluiten.addEventListener('click', sluitMenu);
            overlay.addEventListener('click', sluitMenu);
            
            const radioButtons = document.querySelectorAll('input[name="zoekmachine"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        zoekmachine.type = e.target.value;
                        opslaanInstellingen();
                    }
                });
            });
            
            zoekveld.addEventListener('input', (e) => toonSuggesties(zoekSuggesties(e.target.value)));
            zoekKnop.addEventListener('click', () => voerZoekopdrachtUit(zoekveld.value));
            zoekveld.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') voerZoekopdrachtUit(zoekveld.value);
            });
            
            document.addEventListener('click', (e) => {
                if (!zoekveld.contains(e.target) && !suggestiesLijst.contains(e.target)) {
                    suggestiesLijst.style.display = 'none';
                }
            });
            
            zoekveld.addEventListener('focus', () => {
                if (zoekveld.value && suggesties.length > 0) {
                    toonSuggesties(zoekSuggesties(zoekveld.value));
                }
            });
        });
    </script>
</body>
</html>
