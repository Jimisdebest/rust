<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Standby</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div style="margin: 20px;">
  <input
    type="text"
    id="bingSearch"
    placeholder="Zoek op Bing..."
    style="padding: 10px; width: 300px; font-size: 16px;"
    onkeydown="if (event.key === 'Enter') bingZoek()"
  />
</div>

<script>
  function bingZoek() {
    const query = document.getElementById('bingSearch').value.trim();
    if (query) {
      const bingUrl = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
      window.open(bingUrl, '_blank');
    }
  }
</script>

  <!-- Achtergrondmuziek -->
  <audio id="bg-music" src="achtergrondmuziekje.mp3" autoplay loop></audio>

  <!-- Achtergrondafbeelding -->
  <img id="image" src="" alt="Wallpaper">

  <!-- Overlay rechtsboven: weer boven, tijd groot, datum kleiner eronder -->
  <div id="overlay-top">
    <div id="weather" class="weather">Weer laden…</div>
    <div id="timeblock">
      <div id="clock" class="clock"></div>
      <div id="date" class="date"></div>
    </div>
  </div>

  <script>
    // Config
    const maxImages = 100;              // Verhoog als je meer 3.jpg, 4.jpg, enz. toevoegt
    const imagePath = "";              // Root
    const images = Array.from({ length: maxImages }, (_, i) => `${i + 1}.jpg`);

    // Elementen
    const imageElement = document.getElementById("image");

    // Afbeelding tonen met fallback en fade
    function showRandomImage() {
      const randomImage = images[Math.floor(Math.random() * images.length)];
      const fullPath = imagePath + randomImage;

      const testImage = new Image();
      testImage.onload = () => {
        imageElement.classList.remove("fade-in");
        void imageElement.offsetWidth; // force reflow
        imageElement.src = fullPath;
        imageElement.classList.add("fade-in");
      };
      testImage.onerror = () => {
        // Probeer direct een andere
        showRandomImage();
      };
      testImage.src = fullPath;
    }

    // Klok en datum
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      const date = now.toLocaleDateString("nl-NL", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
      document.getElementById("clock").textContent = time;
      document.getElementById("date").textContent = date;
    }

    // Weer (Open-Meteo, geen sleutel nodig)
    async function updateWeather() {
      try {
        const lat = 52.237; // Noordwijk-Binnen
        const lon = 4.444;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Europe%2FAmsterdam`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data?.current_weather) {
          document.getElementById("weather").textContent = "Weer niet beschikbaar";
          return;
        }

        const temp = Math.round(data.current_weather.temperature);
        const wind = Math.round(data.current_weather.windspeed);
        const weatherCode = data.current_weather.weathercode;
        const description = getWeatherDescription(weatherCode);

        document.getElementById("weather").textContent = `${temp}°C • ${description} • wind ${wind} km/u`;
      } catch {
        document.getElementById("weather").textContent = "Weer niet beschikbaar";
      }
    }

    function getWeatherDescription(code) {
      const codes = {
        0: "Helder",
        1: "Overwegend helder",
        2: "Deels bewolkt",
        3: "Bewolkt",
        45: "Mist",
        48: "Mist met rijp",
        51: "Lichte motregen",
        53: "Motregen",
        55: "Zware motregen",
        61: "Lichte regen",
        63: "Regen",
        65: "Zware regen",
        71: "Lichte sneeuw",
        73: "Sneeuw",
        75: "Zware sneeuw",
        80: "Lichte buien",
        81: "Buien",
        82: "Zware buien"
      };
      return codes[code] || "Onbekend weer";
    }

    function enterFullscreen() {
      const docEl = document.documentElement;
      if (docEl.requestFullscreen) docEl.requestFullscreen();
      else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
      else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
    }

    window.onload = () => {
      showRandomImage();
      updateClock();
      updateWeather();
      enterFullscreen();

      setInterval(showRandomImage, 60000);  // elke minuut
      setInterval(updateClock, 1000);       // elke seconde
      setInterval(updateWeather, 600000);   // elke 10 min
    };
  </script>
</body>
</html>
