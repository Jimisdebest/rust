<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoekmachine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Licht thema (default) */
        body {
            background-color: #f5f5f5;
            color: #1a1a1a;
        }

        /* Donker thema - op basis van systeem voorkeur */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0a0a0a; /* Donkerder dan voorheen */
                color: #ffffff;
            }
            
            /* Fade-in vanaf zwart voor donker thema */
            .background-image {
                opacity: 0;
                transition: opacity 1.5s ease-in-out;
                animation: fadeFromBlack 2s ease-in-out;
            }
            
            @keyframes fadeFromBlack {
                0% {
                    opacity: 0;
                    background-color: black;
                }
                100% {
                    opacity: 1;
                    background-color: transparent;
                }
            }
        }

        /* Achtergrond container voor animaties */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .background-image.active {
            opacity: 1;
        }

        .zoek-container {
            width: 100%;
            max-width: 600px;
            padding: 20px 20px 20px 20px;
            margin-top: 20px; /* Verkleind van 60px naar 20px */
            position: relative;
            z-index: 1;
        }

        .zoek-wrapper {
            position: relative;
            width: 100%;
        }

        .zoekbalk {
            width: 100%;
            padding: 16px 70px 16px 24px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            color: inherit;
            letter-spacing: 0.3px;
        }

        /* Licht thema zoekbalk */
        .zoekbalk {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            color: #1a1a1a;
        }

        /* Donker thema zoekbalk */
        @media (prefers-color-scheme: dark) {
            .zoekbalk {
                background: rgba(20, 20, 20, 0.95); /* Donkerder */
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
                color: #ffffff;
            }
            
            .zoekbalk::placeholder {
                color: #aaa;
            }
        }

        .zoekbalk:focus {
            outline: none;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            .zoekbalk:focus {
                background: rgba(30, 30, 30, 1);
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            }
        }

        .zoekbalk::placeholder {
            color: #666;
            font-weight: 300;
        }

        .zoek-knop {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: transparent; /* Transparante achtergrond */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0; /* Verberg tekst */
            padding: 8px;
        }

        /* Zoekknop afbeelding - basis stijl (voor licht thema) */
        .zoek-knop::before {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: all 0.3s ease;
        }

        /* Donker thema - wit vergrootglas */
        @media (prefers-color-scheme: dark) {
            .zoek-knop::before {
                background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>');
            }
        }

        .zoek-knop:hover {
            transform: translateY(-50%) scale(1.1);
            background: rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            .zoek-knop:hover {
                background: rgba(255, 255, 255, 0.1);
            }
        }

        .zoek-knop:active {
            transform: translateY(-50%) scale(0.95);
        }

        .instellingen-knop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 24px;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        /* Licht thema instellingen knop */
        .instellingen-knop {
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        /* Donker thema instellingen knop */
        @media (prefers-color-scheme: dark) {
            .instellingen-knop {
                background: rgba(255, 255, 255, 0.2);
                color: white;
            }
            
            .instellingen-knop:hover {
                background: rgba(255, 255, 255, 0.3);
            }
        }

        .instellingen-knop:hover {
            transform: scale(1.1);
        }

        .instellingen-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        /* Licht thema menu */
        .instellingen-menu {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a;
        }

        /* Donker thema menu */
        @media (prefers-color-scheme: dark) {
            .instellingen-menu {
                background: rgba(20, 20, 20, 0.98); /* Donkerder */
                color: #ffffff;
            }
            
            .instellingen-menu h2,
            .instellingen-menu h3 {
                color: #ffffff;
            }
            
            .instellingen-menu h3 {
                color: #ccc;
            }
        }

        .instellingen-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .instellingen-menu h2 {
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 24px;
        }

        .instellingen-menu h3 {
            margin: 20px 0 10px 0;
            font-weight: 500;
            font-size: 16px;
        }

        .zoekmachine-opties {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .zoekmachine-optie {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        /* Licht thema opties */
        .zoekmachine-optie {
            background: #f5f5f5;
        }

        .zoekmachine-optie:hover {
            background: #e0e0e0;
        }

        .zoekmachine-optie.selected {
            border-color: #007bff;
            background: #e3f2fd;
        }

        /* Donker thema opties */
        @media (prefers-color-scheme: dark) {
            .zoekmachine-optie {
                background: #2a2a2a;
                color: #ffffff;
            }
            
            .zoekmachine-optie:hover {
                background: #3a3a3a;
            }
            
            .zoekmachine-optie.selected {
                border-color: #007bff;
                background: #1a3a5a;
            }
            
            .zoekmachine-optie .url {
                color: #aaa;
            }
        }

        .zoekmachine-optie input[type="radio"] {
            margin-right: 12px;
            accent-color: #007bff;
        }

        .zoekmachine-optie label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
        }

        .zoekmachine-optie .url {
            color: #666;
            font-size: 12px;
            margin-left: 10px;
        }

        .custom-zoekmachine {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .custom-zoekmachine input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        /* Donker thema custom input */
        @media (prefers-color-scheme: dark) {
            .custom-zoekmachine input {
                background: #2a2a2a;
                border-color: #444;
                color: #ffffff;
            }
            
            .custom-zoekmachine input:focus {
                border-color: #007bff;
                background: #333;
            }
        }

        .custom-zoekmachine input:focus {
            outline: none;
            border-color: #007bff;
        }

        .custom-zoekmachine button {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .custom-zoekmachine button:hover {
            background: #0056b3;
        }

        .menu-sluiten {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s ease;
        }

        /* Licht thema sluit knop */
        .menu-sluiten {
            background: #f0f0f0;
            color: #666;
        }

        .menu-sluiten:hover {
            background: #e0e0e0;
            color: #333;
        }

        /* Donker thema sluit knop */
        @media (prefers-color-scheme: dark) {
            .menu-sluiten {
                background: #333;
                color: #ccc;
            }
            
            .menu-sluiten:hover {
                background: #444;
                color: #fff;
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .suggesties {
            list-style: none;
            padding: 8px;
            margin: 12px 0 0 0;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: slideDown 0.3s ease-out;
        }

        /* Licht thema suggesties */
        .suggesties {
            background: rgba(255, 255, 255, 0.95);
        }

        .suggesties li {
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            margin: 2px 0;
        }

        /* Licht thema suggestie items */
        .suggesties li {
            color: #1a1a1a;
        }

        .suggesties li:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        /* Donker thema suggesties */
        @media (prefers-color-scheme: dark) {
            .suggesties {
                background: rgba(20, 20, 20, 0.98); /* Donkerder */
                border-color: rgba(255, 255, 255, 0.1);
            }
            
            .suggesties li {
                color: #ffffff;
            }
            
            .suggesties li:hover {
                background: #3a3a3a;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            margin-top: 16px;
            color: white;
            font-size: 14px;
            text-align: center;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(220, 53, 69, 0.9);
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .loading {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            padding: 8px 20px;
            border-radius: 50px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        /* Licht thema loading */
        .loading {
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        /* Donker thema loading */
        @media (prefers-color-scheme: dark) {
            .loading {
                background: rgba(255, 255, 255, 0.2);
                color: white;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Scrollbar styling */
        .suggesties::-webkit-scrollbar {
            width: 8px;
        }

        .suggesties::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .suggesties::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .suggesties::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Donker thema scrollbar */
        @media (prefers-color-scheme: dark) {
            .suggesties::-webkit-scrollbar-track {
                background: #2a2a2a;
            }
            
            .suggesties::-webkit-scrollbar-thumb {
                background: #666;
            }
            
            .suggesties::-webkit-scrollbar-thumb:hover {
                background: #888;
            }
        }
        
        #customEngineInfo {
            font-size: 12px;
            margin-top: 5px;
        }
        
        @media (prefers-color-scheme: dark) {
            #customEngineInfo {
                color: #aaa !important;
            }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div id="bg1" class="background-image"></div>
        <div id="bg2" class="background-image"></div>
    </div>

    <div class="zoek-container">
        <div class="zoek-wrapper">
            <input type="text" id="zoekveld" class="zoekbalk" placeholder="Zoeken...">
            <button id="zoek-knop" class="zoek-knop" aria-label="Zoeken"></button>
        </div>
        <ul id="suggesties-lijst" class="suggesties"></ul>
        <div class="loading" id="loading">Bezig met laden...</div>
        <div class="error" id="error"></div>
    </div>

    <button class="instellingen-knop" id="instellingenKnop">⚙️</button>

    <div class="overlay" id="overlay"></div>

    <div class="instellingen-menu" id="instellingenMenu">
        <button class="menu-sluiten" id="menuSluiten">✕</button>
        <h2>Instellingen</h2>
        
        <h3>Kies zoekmachine</h3>
        <div class="zoekmachine-opties" id="zoekmachineOpties">
            <div class="zoekmachine-optie" data-engine="google">
                <input type="radio" name="zoekmachine" id="engineGoogle" value="google" checked>
                <label for="engineGoogle">🔍 Google</label>
                <span class="url">google.com</span>
            </div>
            <div class="zoekmachine-optie" data-engine="bing">
                <input type="radio" name="zoekmachine" id="engineBing" value="bing">
                <label for="engineBing">🅱️ Bing</label>
                <span class="url">bing.com</span>
            </div>
            <div class="zoekmachine-optie" data-engine="duckduckgo">
                <input type="radio" name="zoekmachine" id="engineDuckDuckGo" value="duckduckgo">
                <label for="engineDuckDuckGo">🦆 DuckDuckGo</label>
                <span class="url">duckduckgo.com</span>
            </div>
            <div class="zoekmachine-optie" data-engine="yahoo">
                <input type="radio" name="zoekmachine" id="engineYahoo" value="yahoo">
                <label for="engineYahoo">📰 Yahoo</label>
                <span class="url">yahoo.com</span>
            </div>
            <div class="zoekmachine-optie" data-engine="baidu">
                <input type="radio" name="zoekmachine" id="engineBaidu" value="baidu">
                <label for="engineBaidu">🐻 Baidu</label>
                <span class="url">baidu.com</span>
            </div>
            <div class="zoekmachine-optie" data-engine="yandex">
                <input type="radio" name="zoekmachine" id="engineYandex" value="yandex">
                <label for="engineYandex">🇷🇺 Yandex</label>
                <span class="url">yandex.com</span>
            </div>
        </div>

        <h3>Eigen zoekmachine</h3>
        <div class="custom-zoekmachine">
            <input type="text" id="customEngineUrl" placeholder="https://example.com/search?q=">
            <button id="customEngineOpslaan">Opslaan</button>
        </div>
        <div id="customEngineInfo" style="font-size: 12px; color: #666; margin-top: 5px;">
            Gebruik {q} voor de zoekterm (bijv. https://google.com/search?q={q})
        </div>
    </div>

    <script>
        // Data structuur voor suggesties
        let suggesties = [];
        let huidigeAchtergrond = 0;
        let totaalAchtergronden = 10;
        let isAanHetWisselen = false;
        
        // Zoekmachine instellingen
        let zoekmachine = {
            type: 'google',
            customUrl: ''
        };

        // Zoekmachine URLs
        const zoekmachineUrls = {
            google: 'https://www.google.com/search?q={q}',
            bing: 'https://www.bing.com/search?q={q}',
            duckduckgo: 'https://duckduckgo.com/?q={q}',
            yahoo: 'https://search.yahoo.com/search?p={q}',
            baidu: 'https://www.baidu.com/s?wd={q}',
            yandex: 'https://yandex.com/search/?text={q}'
        };

        // Lijst van mogelijke afbeelding extensies
        const afbeeldingExtensies = ['.png', '.jpg', '.jpeg', '.gif', '.webp'];

        // Laad opgeslagen instellingen
        function laadInstellingen() {
            const opgeslagen = localStorage.getItem('zoekmachineInstellingen');
            if (opgeslagen) {
                try {
                    const instellingen = JSON.parse(opgeslagen);
                    zoekmachine = instellingen;
                    
                    // Update radio button
                    if (zoekmachine.type !== 'custom') {
                        const radio = document.querySelector(`input[name="zoekmachine"][value="${zoekmachine.type}"]`);
                        if (radio) radio.checked = true;
                    }
                    
                    // Update custom URL veld
                    document.getElementById('customEngineUrl').value = zoekmachine.customUrl || '';
                } catch (e) {
                    console.error('Fout bij laden instellingen:', e);
                }
            }
        }

        // Sla instellingen op
        function opslaanInstellingen() {
            localStorage.setItem('zoekmachineInstellingen', JSON.stringify(zoekmachine));
        }

        // Functie om zoekopdracht uit te voeren met gekozen zoekmachine
        function voerZoekopdrachtUit(query) {
            if (!query) return;
            
            // Eerst controleren op exacte match met suggestie die URL heeft
            const exacteMatch = suggesties.find(s => 
                s.tekst.toLowerCase() === query.toLowerCase() && s.url
            );
            
            if (exacteMatch) {
                openURL(exacteMatch.url);
                return;
            }
            
            // Anders gebruiken we de gekozen zoekmachine
            let searchUrl;
            
            if (zoekmachine.type === 'custom' && zoekmachine.customUrl) {
                searchUrl = zoekmachine.customUrl.replace('{q}', encodeURIComponent(query));
            } else {
                const baseUrl = zoekmachineUrls[zoekmachine.type] || zoekmachineUrls.google;
                searchUrl = baseUrl.replace('{q}', encodeURIComponent(query));
            }
            
            window.location.href = searchUrl;
        }

        // Functie om ervoor te zorgen dat URL correct wordt geopend
        function openURL(url) {
            if (url && !url.match(/^https?:\/\//i)) {
                url = 'https://' + url;
            }
            window.location.href = url;
        }

        // Menu openen/sluiten functies
        function openMenu() {
            document.getElementById('instellingenMenu').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function sluitMenu() {
            document.getElementById('instellingenMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // Functie om te controleren of een afbeelding bestaat (met meerdere extensies)
        async function vindAfbeelding(basisNaam) {
            for (const ext of afbeeldingExtensies) {
                const url = basisNaam + ext;
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        console.log(`Afbeelding gevonden: ${url}`);
                        return url;
                    }
                } catch (e) {
                    // Negeer fouten
                }
            }
            return null;
        }

        // Random achtergrond kiezen (1-10)
        function kiesRandomAchtergrond() {
            return Math.floor(Math.random() * totaalAchtergronden) + 1;
        }

        // Achtergrond instellen met animatie
        async function wisselAchtergrond() {
            if (isAanHetWisselen) {
                console.log('Bezig met wisselen...');
                return;
            }
            
            isAanHetWisselen = true;
            console.log('Start achtergrond wissel...');
            
            let nieuwNummer;
            do {
                nieuwNummer = kiesRandomAchtergrond();
            } while (nieuwNummer === huidigeAchtergrond && totaalAchtergronden > 1);
            
            console.log('Nieuwe achtergrond nummer:', nieuwNummer);
            
            // Zoek afbeelding met mogelijke extensies
            const afbeeldingUrl = await vindAfbeelding(`${nieuwNummer}`);
            
            if (afbeeldingUrl) {
                const bg1 = document.getElementById('bg1');
                const bg2 = document.getElementById('bg2');
                
                const isBg1Active = bg1.classList.contains('active');
                console.log('Bg1 actief:', isBg1Active);
                
                if (isBg1Active) {
                    bg2.style.backgroundImage = `url('${afbeeldingUrl}')`;
                    bg2.classList.add('active');
                    bg1.classList.remove('active');
                    console.log('Bg2 geactiveerd met:', afbeeldingUrl);
                } else {
                    bg1.style.backgroundImage = `url('${afbeeldingUrl}')`;
                    bg1.classList.add('active');
                    bg2.classList.remove('active');
                    console.log('Bg1 geactiveerd met:', afbeeldingUrl);
                }
                
                huidigeAchtergrond = nieuwNummer;
                console.log('Nieuwe achtergrond ingesteld:', huidigeAchtergrond);
            } else {
                console.log(`Geen afbeelding gevonden voor nummer ${nieuwNummer}`);
            }
            
            isAanHetWisselen = false;
            console.log('Wissel voltooid');
        }

        // Start achtergrond rotatie
        function startAchtergrondRotatie() {
            console.log('Start achtergrond rotatie...');
            
            // Eerste achtergrond instellen
            setTimeout(async () => {
                console.log('Eerste achtergrond zoeken...');
                let gevonden = false;
                
                for (let i = 1; i <= totaalAchtergronden; i++) {
                    const afbeeldingUrl = await vindAfbeelding(`${i}`);
                    if (afbeeldingUrl) {
                        console.log('Eerste achtergrond gevonden:', i, afbeeldingUrl);
                        document.getElementById('bg1').style.backgroundImage = `url('${afbeeldingUrl}')`;
                        document.getElementById('bg1').classList.add('active');
                        huidigeAchtergrond = i;
                        gevonden = true;
                        break;
                    }
                }
                
                if (!gevonden) {
                    console.log('Geen achtergrondafbeeldingen gevonden');
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').textContent = 'Geen achtergrondafbeeldingen gevonden (zoek naar 1.png, 1.jpg, etc.)';
                } else {
                    console.log('Achtergrond succesvol geladen, start interval...');
                    // Start interval voor wisselen
                    setInterval(async () => {
                        console.log('10 seconden interval - wissel achtergrond');
                        await wisselAchtergrond();
                    }, 10000);
                }
            }, 500);
        }

        // Laad suggesties uit het txt bestand
        async function laadSuggesties() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            
            try {
                loading.style.display = 'block';
                error.style.display = 'none';
                
                console.log('Suggesties laden...');
                const response = await fetch('zoeksuggesties.txt');
                
                if (!response.ok) {
                    throw new Error(`Kan zoeksuggesties.txt niet laden`);
                }
                
                const text = await response.text();
                const regels = text.trim().split('\n');
                
                suggesties = regels.map(regel => {
                    if (!regel.trim()) return null;
                    
                    const eersteGelijkteken = regel.indexOf('=');
                    
                    if (eersteGelijkteken !== -1) {
                        const tekst = regel.substring(0, eersteGelijkteken).trim();
                        let url = regel.substring(eersteGelijkteken + 1).trim();
                        
                        if (url && !url.match(/^https?:\/\//i)) {
                            url = 'https://' + url;
                        }
                        
                        return {
                            tekst: tekst,
                            url: url || null
                        };
                    } else {
                        return {
                            tekst: regel.trim(),
                            url: null
                        };
                    }
                }).filter(s => s !== null);
                
                console.log(`${suggesties.length} suggesties geladen`);
                loading.style.display = 'none';
                
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Fout: ${err.message}`;
                console.error('Fout:', err);
            }
        }

        // Zoek suggesties op basis van input (maximaal 10)
        function zoekSuggesties(input) {
            if (!input || suggesties.length === 0) return [];
            input = input.toLowerCase();
            
            const gevonden = suggesties.filter(s => 
                s.tekst.toLowerCase().includes(input)
            );
            
            return gevonden.slice(0, 10);
        }

        // Toon suggesties in de UI
        function toonSuggesties(suggestieLijst) {
            const lijst = document.getElementById('suggesties-lijst');
            
            if (suggestieLijst.length === 0) {
                lijst.style.display = 'none';
                return;
            }
            
            lijst.innerHTML = '';
            suggestieLijst.forEach(suggestie => {
                const li = document.createElement('li');
                li.textContent = suggestie.tekst + (suggestie.url ? ' →' : '');
                li.onclick = () => selecteerSuggestie(suggestie);
                lijst.appendChild(li);
            });
            
            lijst.style.display = 'block';
        }

        // Verwerk geselecteerde suggestie
        function selecteerSuggestie(suggestie) {
            const zoekveld = document.getElementById('zoekveld');
            zoekveld.value = suggestie.tekst;
            
            if (suggestie.url) {
                openURL(suggestie.url);
            } else {
                document.getElementById('suggesties-lijst').style.display = 'none';
                voerZoekopdrachtUit(suggestie.tekst);
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM geladen, start applicatie...');
            
            laadInstellingen();
            laadSuggesties().then(() => {
                console.log('Suggesties geladen, start achtergrond...');
                startAchtergrondRotatie();
            });
            
            const zoekveld = document.getElementById('zoekveld');
            const suggestiesLijst = document.getElementById('suggesties-lijst');
            const zoekKnop = document.getElementById('zoek-knop');
            const instellingenKnop = document.getElementById('instellingenKnop');
            const menuSluiten = document.getElementById('menuSluiten');
            const overlay = document.getElementById('overlay');
            
            // Ctrl+I shortcut
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'i') {
                    e.preventDefault();
                    if (document.getElementById('instellingenMenu').classList.contains('active')) {
                        sluitMenu();
                    } else {
                        openMenu();
                    }
                }
            });
            
            // Menu openen/sluiten
            instellingenKnop.addEventListener('click', openMenu);
            menuSluiten.addEventListener('click', sluitMenu);
            overlay.addEventListener('click', sluitMenu);
            
            // Zoekmachine keuze
            const radioButtons = document.querySelectorAll('input[name="zoekmachine"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        zoekmachine.type = e.target.value;
                        zoekmachine.customUrl = '';
                        opslaanInstellingen();
                    }
                });
            });
            
            // Custom zoekmachine opslaan
            document.getElementById('customEngineOpslaan').addEventListener('click', () => {
                const customUrl = document.getElementById('customEngineUrl').value.trim();
                if (customUrl) {
                    zoekmachine.type = 'custom';
                    zoekmachine.customUrl = customUrl;
                    opslaanInstellingen();
                    
                    // Deselecteer radio buttons
                    radioButtons.forEach(radio => {
                        radio.checked = false;
                    });
                }
            });
            
            zoekveld.addEventListener('input', (e) => {
                const input = e.target.value;
                const gevondenSuggesties = zoekSuggesties(input);
                toonSuggesties(gevondenSuggesties);
            });
            
            zoekKnop.addEventListener('click', () => {
                voerZoekopdrachtUit(zoekveld.value);
            });
            
            zoekveld.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    voerZoekopdrachtUit(zoekveld.value);
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!zoekveld.contains(e.target) && !suggestiesLijst.contains(e.target)) {
                    suggestiesLijst.style.display = 'none';
                }
            });
            
            zoekveld.addEventListener('focus', () => {
                if (zoekveld.value && suggesties.length > 0) {
                    const gevondenSuggesties = zoekSuggesties(zoekveld.value);
                    toonSuggesties(gevondenSuggesties);
                }
            });
        });
    </script>
</body>
</html>
