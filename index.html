<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Jim's Startpagina</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #bingSearchContainer {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    #bingSearch {
      padding: 10px;
      width: 300px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: rgba(255, 255, 255, 0.9);
    }

    #bingButton {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #0078D7;
      color: white;
      cursor: pointer;
    }

    #image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }
  </style>
</head>
<body>

  <!-- Zoekbalk + knop -->
  <div id="bingSearchContainer">
    <input
      type="text"
      id="bingSearch"
      placeholder="Zoek op Bing..."
      onkeydown="if (event.key === 'Enter') bingZoek()"
    />
    <button id="bingButton" onclick="bingZoek()">Zoek</button>
  </div>

  <!-- Achtergrondafbeelding -->
  <img id="image" src="" alt="Wallpaper">

  <script>
    function bingZoek() {
      const query = document.getElementById('bingSearch').value.trim();
      if (query) {
        const bingUrl = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
        window.open(bingUrl, '_blank');
      }
    }

    const totalImages = 14;
    const imagePath = "images/";
    const imageElement = document.getElementById("image");

    function showRandomImage() {
      const randomIndex = Math.floor(Math.random() * totalImages) + 1;
      const fullPath = `${imagePath}${randomIndex}.jpg`;

      const testImage = new Image();
      testImage.onload = () => {
        imageElement.src = fullPath;
      };
      testImage.onerror = () => showRandomImage();
      testImage.src = fullPath;
    }

    window.onload = () => {
      showRandomImage();
      setInterval(showRandomImage, 60000); // elke minuut wisselen
    };
  </script>
</body>
</html>
