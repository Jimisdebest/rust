<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Wallpaper Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <img id="image" src="" alt="Wallpaper">
  <div id="overlay">
    <div id="clock"></div>
    <div id="date"></div>
  </div>

  <script>
    const images = ["1.jpg", "2.jpg"];
    const imagePath = ""; // root van de repository

    function showRandomImage() {
      const randomImage = images[Math.floor(Math.random() * images.length)];
      document.getElementById("image").src = imagePath + randomImage;
    }

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("nl-NL", {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const date = now.toLocaleDateString("nl-NL", {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      document.getElementById("clock").textContent = time;
      document.getElementById("date").textContent = date;
    }

    function enterFullscreen() {
      const docEl = document.documentElement;
      if (docEl.requestFullscreen) {
        docEl.requestFullscreen();
      } else if (docEl.webkitRequestFullscreen) {
        docEl.webkitRequestFullscreen();
      } else if (docEl.msRequestFullscreen) {
        docEl.msRequestFullscreen();
      }
    }

    window.onload = () => {
      showRandomImage();
      updateClock();
      enterFullscreen();
      setInterval(showRandomImage, 60000); // elke minuut
      setInterval(updateClock, 1000);      // elke seconde
    };
  </script>
</body>
</html>
