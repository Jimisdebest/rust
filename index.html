<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoekmachine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .zoek-container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px 20px 20px;
            margin-top: 60px;
        }

        .zoek-wrapper {
            position: relative;
            width: 100%;
        }

        .zoekbalk {
            width: 100%;
            padding: 16px 70px 16px 24px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            color: #1a1a1a;
            letter-spacing: 0.3px;
        }

        .zoekbalk:focus {
            outline: none;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .zoekbalk::placeholder {
            color: #666;
            font-weight: 300;
        }

        .zoek-knop {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: #007bff;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            font-size: 20px;
            font-weight: bold;
        }

        .zoek-knop:hover {
            background: #0056b3;
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .zoek-knop:active {
            transform: translateY(-50%) scale(0.95);
        }

        .suggesties {
            list-style: none;
            padding: 8px;
            margin: 12px 0 0 0;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .suggesties li {
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 16px;
            color: #1a1a1a;
            font-weight: 400;
            transition: all 0.2s ease;
            margin: 2px 0;
        }

        .suggesties li:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .error {
            margin-top: 16px;
            color: white;
            font-size: 14px;
            text-align: center;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(220, 53, 69, 0.9);
            display: none;
        }

        .loading {
            margin-top: 16px;
            color: white;
            font-size: 14px;
            text-align: center;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            display: none;
        }

        /* Scrollbar styling */
        .suggesties::-webkit-scrollbar {
            width: 8px;
        }

        .suggesties::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .suggesties::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .suggesties::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="zoek-container">
        <div class="zoek-wrapper">
            <input type="text" id="zoekveld" class="zoekbalk" placeholder="Zoeken...">
            <button id="zoek-knop" class="zoek-knop">→</button>
        </div>
        <ul id="suggesties-lijst" class="suggesties"></ul>
        <div class="loading" id="loading">Bezig met laden...</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        // Data structuur voor suggesties
        let suggesties = [];
        let huidigeAchtergrond = 0;
        let totaalAchtergronden = 2;

        // Functie om ervoor te zorgen dat URL correct wordt geopend
        function openURL(url) {
            // Controleer of de URL begint met http:// of https://
            if (url && !url.match(/^https?:\/\//i)) {
                // Als het niet begint met http:// of https://, voeg https:// toe
                url = 'https://' + url;
            }
            window.location.href = url;
        }

        // Functie om te controleren of een afbeelding bestaat
        function controleerAfbeelding(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        // Random achtergrond kiezen (1-10)
        function kiesRandomAchtergrond() {
            return Math.floor(Math.random() * totaalAchtergronden) + 1;
        }

        // Achtergrond instellen
        async function setAchtergrond(nummer) {
            const pad = `${nummer}.png`;
            
            // Controleer of afbeelding bestaat
            const bestaat = await controleerAfbeelding(pad);
            
            if (bestaat) {
                document.body.style.backgroundImage = `url('${pad}')`;
                huidigeAchtergrond = nummer;
            } else {
                // Probeer een andere afbeelding
                for (let i = 1; i <= totaalAchtergronden; i++) {
                    if (i !== nummer) {
                        const testPad = `${i}.png`;
                        const testBestaat = await controleerAfbeelding(testPad);
                        if (testBestaat) {
                            document.body.style.backgroundImage = `url('${testPad}')`;
                            huidigeAchtergrond = i;
                            return;
                        }
                    }
                }
                
                // Geen enkele afbeelding gevonden
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Geen achtergrondafbeeldingen gevonden';
            }
        }

        // Nieuwe random achtergrond laden
        async function laadNieuweAchtergrond() {
            let nieuwNummer;
            do {
                nieuwNummer = kiesRandomAchtergrond();
            } while (nieuwNummer === huidigeAchtergrond && totaalAchtergronden > 1);
            
            await setAchtergrond(nieuwNummer);
        }

        // Start achtergrond rotatie
        function startAchtergrondRotatie() {
            // Direct eerste achtergrond
            setTimeout(() => {
                laadNieuweAchtergrond();
            }, 100);
            
            // Elke minuut nieuwe achtergrond
            setInterval(laadNieuweAchtergrond, 60);
        }

        // Laad suggesties uit het txt bestand
        async function laadSuggesties() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            
            try {
                loading.style.display = 'block';
                error.style.display = 'none';
                
                const response = await fetch('zoeksuggesties.txt');
                
                if (!response.ok) {
                    throw new Error(`Kan zoeksuggesties niet laden`);
                }
                
                const text = await response.text();
                const regels = text.trim().split('\n');
                
                suggesties = regels.map(regel => {
                    if (!regel.trim()) return null;
                    
                    const eersteGelijkteken = regel.indexOf('=');
                    
                    if (eersteGelijkteken !== -1) {
                        const tekst = regel.substring(0, eersteGelijkteken).trim();
                        let url = regel.substring(eersteGelijkteken + 1).trim();
                        
                        // Zorg dat de URL correct is
                        if (url && !url.match(/^https?:\/\//i)) {
                            url = 'https://' + url;
                        }
                        
                        return {
                            tekst: tekst,
                            url: url || null
                        };
                    } else {
                        return {
                            tekst: regel.trim(),
                            url: null
                        };
                    }
                }).filter(s => s !== null);
                
                loading.style.display = 'none';
                
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Fout: ${err.message}`;
                console.error('Fout:', err);
            }
        }

        // Zoek suggesties op basis van input (maximaal 10)
        function zoekSuggesties(input) {
            if (!input || suggesties.length === 0) return [];
            input = input.toLowerCase();
            
            const gevonden = suggesties.filter(s => 
                s.tekst.toLowerCase().includes(input)
            );
            
            return gevonden.slice(0, 10);
        }

        // Toon suggesties in de UI
        function toonSuggesties(suggestieLijst) {
            const lijst = document.getElementById('suggesties-lijst');
            
            if (suggestieLijst.length === 0) {
                lijst.style.display = 'none';
                return;
            }
            
            lijst.innerHTML = '';
            suggestieLijst.forEach(suggestie => {
                const li = document.createElement('li');
                li.textContent = suggestie.tekst + (suggestie.url ? ' →' : '');
                li.onclick = () => selecteerSuggestie(suggestie);
                lijst.appendChild(li);
            });
            
            lijst.style.display = 'block';
        }

        // Verwerk geselecteerde suggestie
        function selecteerSuggestie(suggestie) {
            const zoekveld = document.getElementById('zoekveld');
            zoekveld.value = suggestie.tekst;
            
            if (suggestie.url) {
                // Gebruik de openURL functie voor correcte redirect
                openURL(suggestie.url);
            } else {
                document.getElementById('suggesties-lijst').style.display = 'none';
                voerZoekopdrachtUit(suggestie.tekst);
            }
        }

        // Voer zoekopdracht uit
        function voerZoekopdrachtUit(query) {
            if (!query) return;
            
            const exacteMatch = suggesties.find(s => 
                s.tekst.toLowerCase() === query.toLowerCase() && s.url
            );
            
            if (exacteMatch) {
                // Gebruik de openURL functie voor correcte redirect
                openURL(exacteMatch.url);
            } else {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Eerst suggesties laden, dan achtergrond starten
            laadSuggesties().then(() => {
                startAchtergrondRotatie();
            });
            
            const zoekveld = document.getElementById('zoekveld');
            const suggestiesLijst = document.getElementById('suggesties-lijst');
            const zoekKnop = document.getElementById('zoek-knop');
            
            zoekveld.addEventListener('input', (e) => {
                const input = e.target.value;
                const gevondenSuggesties = zoekSuggesties(input);
                toonSuggesties(gevondenSuggesties);
            });
            
            zoekKnop.addEventListener('click', () => {
                voerZoekopdrachtUit(zoekveld.value);
            });
            
            zoekveld.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    voerZoekopdrachtUit(zoekveld.value);
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!zoekveld.contains(e.target) && !suggestiesLijst.contains(e.target)) {
                    suggestiesLijst.style.display = 'none';
                }
            });
            
            zoekveld.addEventListener('focus', () => {
                if (zoekveld.value && suggesties.length > 0) {
                    const gevondenSuggesties = zoekSuggesties(zoekveld.value);
                    toonSuggesties(gevondenSuggesties);
                }
            });
        });
    </script>
</body>
</html>
